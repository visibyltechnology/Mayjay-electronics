<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAYJAY CONCEPTS - E-Commerce & Sales Automation</title>
    <!-- Tailwind CSS for Responsive Layouts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandDark: '#1e293b',
                        brandBlack: '#0f172a',
                        brandGreen: '#22c55e',
                        brandLime: '#a3e635',
                        brandYellow: '#eab308'
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom smooth transition overrides */
        .transition-all-300 {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Custom scrollbar to match the premium theme */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #a3e635;
            border-radius: 4px;
        }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans overflow-x-hidden w-full">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
