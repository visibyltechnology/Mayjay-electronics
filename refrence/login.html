<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - MAYJAY CONCEPTS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js for fluid interactions -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandDark: '#1e293b',
                        brandBlack: '#0f172a',
                        brandGreen: '#22c55e',
                        brandLime: '#a3e635',
                        brandYellow: '#eab308'
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .filter-checkbox:checked+div {
            background-color: #a3e635;
            border-color: #a3e635;
        }

        .filter-checkbox:checked+div svg {
            display: block;
        }
    </style>
</head>

<body class="bg-[#f8fafc] text-gray-800 font-sans" x-data="{ openCat: true, showPass: false }">

    <!-- PAGE HEADER -->
    <div class="bg-brandBlack relative overflow-hidden border-b border-gray-800 py-12">
        <div class="absolute top-0 right-0 -mt-16 -mr-16 w-64 h-64 bg-brandLime opacity-10 rounded-full blur-3xl"></div>
        <div
            class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 flex flex-col sm:flex-row items-center justify-between">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tight mb-2">Welcome Back</h1>
                <nav class="flex text-xs font-medium text-gray-400 space-x-2 uppercase tracking-widest">
                    <a href="#" class="hover:text-brandLime transition-colors">Home</a>
                    <span class="text-gray-600">/</span>
                    <span class="text-brandLime">Login</span>
                </nav>
            </div>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 lg:py-16">
        <div class="flex flex-col lg:flex-row gap-10">

            <!-- PERSISTENT SIDEBAR -->
            <aside class="w-full lg:w-1/4 block">
                <div class="space-y-6 lg:sticky lg:top-28">

                    <!-- Categories -->
                    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                        <button @click="openCat = !openCat"
                            class="w-full px-5 py-4 flex items-center justify-between bg-gray-50/50 hover:bg-gray-50 transition-colors">
                            <span class="text-sm font-black text-brandDark tracking-widest uppercase">Categories</span>
                            <i class="fa-solid fa-chevron-down text-gray-400 text-xs transition-transform duration-300"
                                :class="openCat ? 'rotate-180' : ''"></i>
                        </button>
                        <div x-show="openCat" x-transition
                            class="p-5 pt-2 space-y-3 max-h-96 overflow-y-auto custom-scrollbar">
                            <template x-for="cat in [
                                {name: 'Solar & Power', count: 24},
                                {name: 'Industrial Automation', count: 18},
                                {name: 'Smart Electronics', count: 56},
                                {name: 'Home Appliances', count: 42},
                                {name: 'Smartphones & Tablets', count: 38},
                                {name: 'Laptops & Computers', count: 29},
                                {name: 'TVs & Audio Systems', count: 45},
                                {name: 'Gaming & Consoles', count: 12},
                                {name: 'Cameras & Drones', count: 15},
                                {name: 'Networking & Wi-Fi', count: 19}
                            ]" :key="cat.name">
                                <label class="flex items-center cursor-pointer group">
                                    <div class="relative flex items-center justify-center">
                                        <input type="checkbox" class="filter-checkbox opacity-0 absolute h-0 w-0">
                                        <div
                                            class="w-5 h-5 border-2 border-gray-300 rounded transition-colors group-hover:border-brandLime flex items-center justify-center">
                                            <svg class="w-3 h-3 text-brandBlack hidden pointer-events-none" fill="none"
                                                stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                                    d="M5 13l4 4L19 7"></path>
                                            </svg>
                                        </div>
                                    </div>
                                    <span
                                        class="ml-3 text-sm text-gray-600 group-hover:text-brandDark font-medium transition-colors"
                                        x-text="cat.name"></span>
                                    <span class="ml-auto text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full"
                                        x-text="cat.count"></span>
                                </label>
                            </template>
                        </div>
                    </div>

                    <!-- Finance Banner -->
                    <div
                        class="bg-gradient-to-br from-brandDark to-brandBlack rounded-2xl p-6 relative overflow-hidden group shadow-lg border border-gray-800">
                        <div
                            class="absolute -right-4 -bottom-4 w-32 h-32 bg-brandLime rounded-full mix-blend-overlay opacity-20 group-hover:scale-150 transition-transform duration-700">
                        </div>
                        <h4 class="text-white font-black text-xl leading-tight mb-2 relative z-10">FINANCE<br><span
                                class="text-brandLime">YOUR SETUP</span></h4>
                        <p class="text-gray-400 text-xs mb-5 relative z-10 leading-relaxed">Pay over time with 0%
                            interest on your setups.</p>
                        <a href="#"
                            class="inline-flex items-center space-x-2 bg-white text-brandDark font-bold text-xs px-5 py-2.5 rounded-lg hover:bg-brandLime transition-colors relative z-10">
                            <span>Learn More</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </aside>

            <!-- AUTH BOX CONTAINER -->
            <div class="w-full lg:w-3/4 flex justify-center items-start">
                <div
                    class="w-full max-w-lg bg-white rounded-3xl border border-gray-100 p-8 sm:p-12 shadow-sm animate-fade-in-up">

                    <div class="mb-8">
                        <h2 class="text-2xl font-black text-brandDark tracking-tight mb-1">Sign In</h2>
                        <p class="text-sm text-gray-500">Log in to track your orders, view saved items, and manage your
                            installment plans.</p>
                    </div>

                    <form class="space-y-5" @submit.prevent>
                        <!-- Email Input -->
                        <div>
                            <label class="text-xs font-bold text-gray-400 block uppercase tracking-wider mb-2">Email
                                Address</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                                    <i class="fa-solid fa-envelope text-sm"></i>
                                </span>
                                <input type="email" placeholder="yourname@email.com"
                                    class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3.5 pl-11 pr-4 text-sm text-brandDark font-medium focus:outline-none focus:border-brandLime focus:bg-white transition-all">
                            </div>
                        </div>

                        <!-- Password Input -->
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label
                                    class="text-xs font-bold text-gray-400 block uppercase tracking-wider">Password</label>
                                <a href="#"
                                    class="text-xs font-bold text-brandDark hover:text-brandGreen transition-colors">Forgot
                                    Password?</a>
                            </div>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                                    <i class="fa-solid fa-lock text-sm"></i>
                                </span>
                                <input :type="showPass ? 'text' : 'password'" placeholder="Enter your password"
                                    class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3.5 pl-11 pr-12 text-sm text-brandDark font-medium focus:outline-none focus:border-brandLime focus:bg-white transition-all">
                                <button type="button" @click="showPass = !showPass"
                                    class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-400 hover:text-brandDark transition-colors">
                                    <i class="fa-solid" :class="showPass ? 'fa-eye-slash' : 'fa-eye'"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Remember session checkbox -->
                        <label class="flex items-center cursor-pointer group pt-1">
                            <div class="relative flex items-center justify-center">
                                <input type="checkbox" class="filter-checkbox opacity-0 absolute h-0 w-0">
                                <div
                                    class="w-5 h-5 border-2 border-gray-300 rounded transition-colors group-hover:border-brandLime flex items-center justify-center">
                                    <svg class="w-3 h-3 text-brandBlack hidden pointer-events-none" fill="none"
                                        stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                            d="M5 13l4 4L19 7"></path>
                                    </svg>
                                </div>
                            </div>
                            <span
                                class="ml-3 text-xs text-gray-500 font-semibold group-hover:text-brandDark transition-colors">Remember
                                me</span>
                        </label>

                        <!-- Submit Main Action -->
                        <div class="pt-4">
                            <button type="submit"
                                class="w-full bg-brandDark text-white hover:bg-brandLime hover:text-brandBlack font-bold text-base py-4 rounded-xl transition-all duration-300 flex items-center justify-center space-x-2 shadow-lg active:scale-[0.99]">
                                <span>Log In</span>
                                <i class="fa-solid fa-arrow-right text-xs"></i>
                            </button>
                        </div>
                    </form>

                    <!-- Route Switcher -->
                    <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                        <p class="text-sm text-gray-500">
                            Don't have an account?
                            <a href="#"
                                class="font-bold text-brandDark hover:text-brandLime transition-colors ml-1">Create one
                                now</a>
                        </p>
                    </div>

                </div>
            </div>

        </div>
    </main>
</body>

</html>
